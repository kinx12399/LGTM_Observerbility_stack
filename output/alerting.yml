# 1. 알림을 받을 연락처 (Contact Points) 정의
contactPoints:
  - orgId: 1
    uid: email-alert-uid
    name: Email-Alert
    # receivers 형태 대신 공식 규격인 settings 직접 매핑 구조로 변경합니다.
    settings:
      addresses: '${GF_SMTP_FROM_ADDRESS}'
      singleEmail: true
    type: email

# 2. 알림 발송 경로 정의
policies:
  - orgId: 1
    receiver: Email-Alert
    group_by:
      - alertname
      - grafana_folder
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 4h