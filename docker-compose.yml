# docker-compose.yml
services:
  loki:
    image: grafana/loki:latest
    container_name: loki
    expose:
      - "3100"
    volumes:
      - ./config/loki-config.yaml:/etc/loki/local-config.yaml
      - loki-data:/loki
    networks:
      - lgtm-net
    restart: unless-stopped

  promtail:
    image: grafana/promtail:latest
    container_name: promtail
    volumes:
      - ./config/promtail-config.yaml:/etc/promtail/config.yml
      - /var/log:/var/log:ro # VM의 시스템 로그 수집용 읽기 전용 마운트
    command: -config.file=/etc/promtail/config.yml
    networks:
      - lgtm-net
    restart: unless-stopped
    depends_on:
      - loki

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000" # Web UI 외부 접근 허용
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      - lgtm-net
    restart: unless-stopped

    # --- 2주차 메트릭 스택 추가 ---
  minio:
    image: minio/minio
    container_name: minio
    # Mimir가 사용할 버킷(mimir)을 기동 시 자동 생성
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=mimir
      - MINIO_ROOT_PASSWORD=supersecret
    volumes:
      - minio-data:/data
    networks:
      - lgtm-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5
    
  create-bucket:
    image: minio/mc
    depends_on:
      - minio:
          condition: service_healthy # minio의 헬스체크가 통과되면 실행
    networks:
      - lgtm-net
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      /usr/bin/mc alias set myminio http://minio:9000 mimir supersecret;
      /usr/bin/mc mb myminio/mimir --ignore-existing;
      exit 0;"

  mimir:
    image: grafana/mimir:latest
    container_name: mimir
    command: ["-config.file=/etc/mimir/mimir-config.yaml"]
    expose:
      - "9009"
    volumes:
      - ./config/mimir-config.yaml:/etc/mimir/mimir-config.yaml
      - mimir-data:/data
    networks:
      - lgtm-net
    restart: unless-stopped
    depends_on:
      - minio:
          condition: service_healthy # Mimir도 MinIO가 완전히 켜진 후 실행되도록 보완

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    expose:
      - "9090"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    networks:
      - lgtm-net
    restart: unless-stopped

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    command:
      - '--path.rootfs=/host'
    expose:
      - "9100"
    pid: host
    volumes:
      - '/:/host:ro,rslave'
    networks:
      - lgtm-net
    restart: unless-stopped

networks:
  lgtm-net:
    driver: bridge

volumes:
  loki-data:
  grafana-data:
  minio-data:
  mimir-data:
  prometheus-data: