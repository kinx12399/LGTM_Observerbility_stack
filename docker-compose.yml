# docker-compose.yml
services:
  loki:
    image: grafana/loki:latest
    container_name: loki
    expose:
      - "3100"
    volumes:
      - ./config/loki-config.yaml:/etc/loki/local-config.yaml
      - loki-data:/loki
    networks:
      - lgtm-net
    restart: unless-stopped

  promtail:
    image: grafana/promtail:latest
    container_name: promtail
    volumes:
      - ./config/promtail-config.yaml:/etc/promtail/config.yml
      - /var/log:/var/log:ro # VM의 시스템 로그 수집용 읽기 전용 마운트
    command: -config.file=/etc/promtail/config.yml
    networks:
      - lgtm-net
    restart: unless-stopped
    depends_on:
      - loki

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000" # Web UI 외부 접근 허용
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      - lgtm-net
    restart: unless-stopped

# 전용 Docker 브리지 네트워크 정의
networks:
  lgtm-net:
    driver: bridge

# 데이터 유지를 위한 Named 볼륨 정의
volumes:
  loki-data:
  grafana-data:
