server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: system
    static_configs:
      - targets:
          - localhost
        labels:
          job: varlogs
          log_type: generic
          # docker-compose에서 마운트한 VM의 /var/log 디렉토리 로그를 수집
          __path__: /var/log/*log

    pipeline_stages:
      # 1. 로그 내용 중 login, auth, password, 등 보안 키워드 탐색
      - regex:
          expression: '(?P<is_security>(login|logout|auth|password|unauthorized))'
      
      # 2. 위 키워드가 매칭되어 'is_security' 변수가 생성되었다면, log_type 라벨을 'security'로 변경
      - labels:
          log_type:  # 특정 조건일 때 기존 'generic' 라벨을 'security'로 덮어씁니다.
      - template:
          source: log_type
          template: '{{ if .is_security }}security{{ else }}generic{{ end }}'

      # 3. 그 다음 로그 레벨(INFO, WARN, ERROR 등)을 추출합니다.
      - regex:
          expression: '"level":\s*"(?P<log_level>[^"]+)"'

      # 4. [조건부 드롭] 레벨이 INFO이면서, 동시에 보안 로그가 '아닌(generic)' 경우에만 로그를 드롭합니다.
      - drop:
          expression: '(?s)^.*"log_level":"INFO".*"log_type":"generic".*$'
          drop_counter_reason: "non_security_info_sampling"