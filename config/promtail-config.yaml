server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: system
    static_configs:
      - targets:
          - localhost
        labels:
          job: varlogs
          # docker-compose에서 마운트한 VM의 /var/log 디렉토리 로그를 수집
          __path__: /var/log/*log

    pipeline_stages:
      # 1. 정규표현식을 통해 뒤쪽의 실제 JSON 데이터({로 시작해서 }로 끝나는 부분)만 뽑아 'json_content'라는 임시 변수에 담습니다.
      - regex:
          expression: '^(?P<ignore>.*): (?P<json_content>\{.*\})$'
          source: message

      # 2. 뽑아낸 json_content를 대상으로 JSON 파싱을 수행하여 level을 추출합니다.
      - json:
          expressions:
            level: level
          source: json_content

      # 3. 추출한 level을 내부 변수로 등록합니다.
      - labels:
          level:

      # 4. level이 INFO인 로그를 드롭(Drop)합니다.
      - match:
          selector: '{level="INFO"}'
          action: drop