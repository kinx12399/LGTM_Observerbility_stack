groups:
  - name: node-exporter-alerts
    rules:
      # 필수 룰 1: CPU 사용률 > 80% 지속 5분 이상
      - alert: HighCpuUsage
        expr: 100 - (avg by (instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "이반 인스턴스 CPU 사용률 임계치 초과"
          description: "인스턴스 {{ $labels.instance }}의 CPU 사용률이 5분 이상 80%를 초과 중입니다. (현재 값: {{ $value | printf \"%.2f\" }}%)"

      # 필수 룰 2: 디스크 사용률 > 85%
      - alert: HighDiskUsage
        expr: (1 - (node_filesystem_free_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"})) * 100 > 85
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "루트 디스크 용량 부족 예고"
          description: "인스턴스 {{ $labels.instance }}의 디스크 사용량이 85%를 초과했습니다. (현재 값: {{ $value | printf \"%.2f\" }}%)"